<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>记忆曲线任务日历</title>
  <link rel="stylesheet" href="mobile.css">
</head>
<body data-page="mobile">
  <div id="mApp" class="m-app">
    <!-- 顶部导航栏 -->
    <nav class="m-nav">
      <button id="mSettingsBtn" class="m-nav-icon">&#9881;</button>
      <div class="m-nav-center">
        <button id="mPrevMonth" class="m-nav-arrow">&lsaquo;</button>
        <span id="mCurrentMonth" class="m-nav-title"></span>
        <button id="mNextMonth" class="m-nav-arrow">&rsaquo;</button>
      </div>
      <button id="mHistoryBtn" class="m-nav-icon">&#128338;</button>
    </nav>

    <!-- 日期列表 -->
    <div id="mDateList" class="m-list"></div>

    <!-- 空状态 -->
    <div id="mEmpty" class="m-empty" style="display:none;">
      <div class="m-empty-icon">&#128203;</div>
      <div class="m-empty-text">本月暂无任务</div>
      <div class="m-empty-hint">点击 + 添加第一个任务</div>
    </div>

    <!-- FAB -->
    <button id="mFab" class="m-fab">+</button>
  </div>

  <!-- 添加/编辑任务的底部弹窗 -->
  <div id="mTaskSheet" class="m-overlay" style="display:none;">
    <div class="m-sheet">
      <div class="m-sheet-bar"></div>
      <div class="m-sheet-head">
        <h3 id="mSheetTitle">添加任务</h3>
        <button id="mSheetClose" class="m-close-btn">&times;</button>
      </div>
      <div class="m-sheet-body">
        <div id="mSheetDate" class="m-sheet-date"></div>
        <textarea id="mTaskInput" class="m-textarea" placeholder="输入任务内容" maxlength="500" rows="2"></textarea>
        <div id="mImgPreview" class="m-img-row"></div>
        <div class="m-sheet-options">
          <button id="mPickImage" class="m-chip">+ 添加图片</button>
          <input id="mImageFile" type="file" accept="image/*" multiple hidden>
          <label class="m-chip-check"><input id="mSyncReviews" type="checkbox"><span>同步到复习日期</span></label>
        </div>
        <button id="mSubmitBtn" class="m-btn-main">添加任务</button>
        <button id="mDeleteBtn" class="m-btn-del" style="display:none;">删除任务</button>
      </div>
    </div>
  </div>

  <!-- 设置页 -->
  <div id="mSettingsPage" class="m-page" style="display:none;">
    <div class="m-page-head">
      <button id="mBackBtn" class="m-nav-icon">&#8592;</button>
      <h3>设置</h3>
    </div>
    <div class="m-page-body">
      <div class="m-card">
        <h4>复习间隔 <span class="m-hint">任务创建后在第N天生成复习任务</span></h4>
        <div id="mIntervals"></div>
        <div class="m-card-actions">
          <button id="mAddInterval" class="m-chip">+ 增加</button>
          <button id="mResetIntervals" class="m-chip">恢复默认</button>
        </div>
        <button id="mSaveSettings" class="m-btn-main">保存设置</button>
      </div>
      <div class="m-card">
        <h4>批量删除</h4>
        <div class="m-row">
          <select id="mBatchYear" class="m-select"></select>
          <select id="mBatchMonth" class="m-select"></select>
        </div>
        <button id="mBatchDelete" class="m-btn-del">确认删除</button>
      </div>
      <div class="m-card">
        <h4>账号</h4>
        <p class="m-account" id="mAccountName"></p>
        <button id="mLogoutBtn" class="m-btn-del-outline">退出登录</button>
      </div>
    </div>
  </div>

  <!-- 历史记录半屏 -->
  <div id="mHistorySheet" class="m-overlay" style="display:none;">
    <div class="m-sheet">
      <div class="m-sheet-bar"></div>
      <div class="m-sheet-head">
        <h3>操作历史</h3>
        <button id="mHistoryClose" class="m-close-btn">&times;</button>
      </div>
      <div id="mHistoryContent" class="m-sheet-body"></div>
    </div>
  </div>

  <!-- 回退确认 -->
  <div id="mRevertDialog" class="m-dialog-mask" style="display:none;">
    <div class="m-dialog">
      <div class="m-dialog-icon">&#8634;</div>
      <p class="m-dialog-p">确认回退到该操作之前？</p>
      <p id="mRevertDetail" class="m-dialog-d"></p>
      <div class="m-dialog-btns">
        <button id="mRevertCancel" class="m-chip">取消</button>
        <button id="mRevertOk" class="m-btn-main">确认回退</button>
      </div>
    </div>
  </div>

  <script src="../app.js"></script>
  <script src="mobile.js"></script>
</body>
</html>
