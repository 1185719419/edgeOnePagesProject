<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>记忆曲线任务日历</title>
  <link rel="stylesheet" href="/app/mobile.css">
</head>
<body data-page="mobile">
  <div id="mApp" class="m-app">
    <!-- 顶部导航栏 -->
    <nav class="m-nav">
      <button id="mHistoryBtn" class="m-nav-icon" title="操作历史">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>
      <div class="m-nav-center">
        <button id="mPrevMonth" class="m-nav-arrow">&lsaquo;</button>
        <span id="mCurrentMonth" class="m-nav-title"></span>
        <button id="mNextMonth" class="m-nav-arrow">&rsaquo;</button>
      </div>
      <button id="mSettingsBtn" class="m-nav-icon" title="设置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </nav>

    <!-- 日期列表 -->
    <div id="mDateList" class="m-list"></div>

    <!-- 加载/空占位 -->
    <div id="mPlaceholder" class="m-loader">加载中...</div>

    <!-- 空状态 -->
    <div id="mEmpty" class="m-empty" style="display:none;">
      <div class="m-empty-icon">&#128203;</div>
      <div class="m-empty-text">本月暂无任务</div>
      <div class="m-empty-hint">点击 + 添加第一个任务</div>
    </div>

    <!-- FAB -->
    <button id="mFab" class="m-fab">+</button>
  </div>

  <!-- 添加/编辑任务的底部弹窗 -->
  <div id="mTaskSheet" class="m-overlay" style="display:none;">
    <div class="m-sheet">
      <div class="m-sheet-bar"></div>
      <div class="m-sheet-head">
        <h3 id="mSheetTitle">添加任务</h3>
        <button id="mSheetClose" class="m-close-btn">&times;</button>
      </div>
      <div class="m-sheet-body">
        <div id="mSheetDate" class="m-sheet-date-row">
          <select id="mSheetYear" class="m-date-sel"></select>
          <select id="mSheetMonth" class="m-date-sel"></select>
          <select id="mSheetDay" class="m-date-sel"></select>
        </div>
        <textarea id="mTaskInput" class="m-textarea" placeholder="输入任务内容" maxlength="500" rows="2"></textarea>
        <div id="mImgPreview" class="m-img-row"></div>
        <div class="m-sheet-options">
          <button id="mPickImage" class="m-chip">+ 添加图片</button>
          <input id="mImageFile" type="file" accept="image/*" multiple hidden>
          <label class="m-chip-check"><input id="mSyncReviews" type="checkbox"><span>同步到复习日期</span></label>
        </div>
        <button id="mSubmitBtn" class="m-btn-main">添加任务</button>
        <button id="mDeleteBtn" class="m-btn-del" style="display:none;">删除任务</button>
      </div>
    </div>
  </div>

  <!-- 设置页 -->
  <div id="mSettingsPage" class="m-page" style="display:none;">
    <div class="m-page-head">
      <button id="mBackBtn" class="m-nav-icon" title="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h3>设置</h3>
    </div>
    <div class="m-settings-tabs">
      <button class="m-tab active" data-panel="intervals">复习间隔</button>
      <button class="m-tab" data-panel="batchDelete">批量删除</button>
      <button class="m-tab" data-panel="account">账号</button>
      <button class="m-tab" data-panel="theme">主题</button>
    </div>
    <div class="m-page-body">
      <div id="mPanel-intervals" class="m-card">
        <h4>复习间隔 <span class="m-hint">任务创建后在第N天生成复习任务</span></h4>
        <div id="mIntervals"></div>
        <div class="m-card-actions">
          <button id="mAddInterval" class="m-chip">+ 增加</button>
          <button id="mResetIntervals" class="m-chip">恢复默认</button>
        </div>
        <button id="mSaveSettings" class="m-btn-main">保存设置</button>
      </div>
      <div id="mPanel-batchDelete" class="m-card" style="display:none;">
        <span class="m-hint">删除指定年月下的所有任务（含关联的复习任务），不可撤回</span>
        <div class="m-batch-selectors">
          <div class="m-batch-group">
            <label>年份</label>
            <select id="mBatchYear" class="m-select"></select>
          </div>
          <div class="m-batch-group">
            <label>月份</label>
            <select id="mBatchMonth" class="m-select"></select>
          </div>
        </div>
        <div class="m-batch-info" id="mBatchInfo"></div>
        <button id="mBatchDelete" class="m-btn-del-outline">确认删除</button>
        <span id="mBatchMsg" style="display:none;font-size:0.9em;"></span>
      </div>
      <div id="mPanel-account" class="m-card" style="display:none;">
        <h4>账号</h4>
        <p class="m-account" id="mAccountName"></p>
        <button id="mLogoutBtn" class="m-btn-del-outline">退出登录</button>
      </div>
      <div id="mPanel-theme" class="m-card" style="display:none;">
        <h4>主题设置 <span class="m-hint">选择你喜欢的界面配色</span></h4>
        <div class="m-theme-cards">
          <div class="m-theme-card active" data-theme="light" id="mThemeCardLight">
            <div class="m-theme-card-preview m-theme-preview-light"></div>
            <div class="m-theme-card-label">浅色主题</div>
          </div>
          <div class="m-theme-card" data-theme="dark" id="mThemeCardDark">
            <div class="m-theme-card-preview m-theme-preview-dark"></div>
            <div class="m-theme-card-label">深色主题</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 历史记录半屏 -->
  <div id="mHistorySheet" class="m-overlay" style="display:none;">
    <div class="m-sheet">
      <div class="m-sheet-bar"></div>
      <div class="m-sheet-head">
        <h3>操作历史</h3>
        <button id="mHistoryClose" class="m-close-btn">&times;</button>
      </div>
      <div id="mHistoryContent" class="m-sheet-body"></div>
    </div>
  </div>

  <!-- 回退确认 -->
  <div id="mRevertDialog" class="m-dialog-mask" style="display:none;">
    <div class="m-dialog">
      <div class="m-dialog-icon">&#8634;</div>
      <p class="m-dialog-p">确认回退到该操作之前？</p>
      <p id="mRevertDetail" class="m-dialog-d"></p>
      <div class="m-dialog-btns">
        <button id="mRevertCancel" class="m-chip">取消</button>
        <button id="mRevertOk" class="m-btn-main">确认回退</button>
      </div>
    </div>
  </div>

  <!-- 通用确认弹窗 -->
  <div id="mConfirmDialog" class="m-dialog-mask" style="display:none;">
    <div class="m-dialog">
      <div class="m-dialog-icon" id="mConfirmIcon">&#9888;</div>
      <p class="m-dialog-p" id="mConfirmTitle">确认操作</p>
      <p id="mConfirmBody" class="m-dialog-d"></p>
      <div class="m-dialog-btns">
        <button id="mConfirmCancel" class="m-chip">取消</button>
        <button id="mConfirmOk" class="m-btn-main">确认</button>
      </div>
    </div>
  </div>

  <!-- 图片查看器 -->
  <div id="mImageViewer" class="m-img-viewer" style="display:none;">
    <button id="mImgViewerClose" class="m-img-viewer-close">&times;</button>
    <img id="mImgViewerImg" src="" alt="">
  </div>

  <script src="/app.js"></script>
  <script src="/app/mobile.js"></script>
</body>
</html>
