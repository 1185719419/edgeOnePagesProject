<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 记忆曲线任务日历</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .sms-row { display:flex; gap:10px; }
    .sms-row input { flex:1; }
    .sms-btn {
      white-space:nowrap; padding:10px 16px; border:1px solid #667eea; border-radius:6px;
      background:#fff; color:#667eea; font-size:0.9em; font-weight:600; cursor:pointer; transition:all .15s;
    }
    .sms-btn:disabled { color:#ccc; border-color:#ccc; cursor:not-allowed; }
    .sms-btn:hover:not(:disabled) { background:#667eea; color:#fff; }
    .login-phone-hint { font-size:0.85em; color:#8b949e; margin-bottom:16px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card" id="loginCard">
      <div class="login-header">
        <h1>手机登录</h1>
        <p class="login-subtitle">基于艾宾浩斯记忆曲线的任务管理日历</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="phone">手机号</label>
          <input type="tel" id="phone" name="phone" placeholder="请输入手机号" autocomplete="tel" maxlength="11" required>
        </div>

        <div class="form-group">
          <label>验证码</label>
          <div class="sms-row">
            <input type="text" id="code" name="code" placeholder="请输入验证码" autocomplete="one-time-code" maxlength="6" inputmode="numeric" required>
            <button type="button" id="sendSmsBtn" class="sms-btn">发送验证码</button>
          </div>
        </div>

        <div id="message" class="message hidden"></div>

        <button type="submit" id="submitBtn" class="login-btn">登 录</button>
      </form>
    </div>
  </div>

  <script>
    var countdown = 0;
    var timer = null;

    function showMessage(text, type) {
      var el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
    }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.textContent = loading ? '处理中...' : (btn.dataset.defaultText || btn.textContent);
      if (!loading && btn.dataset.defaultText) btn.textContent = btn.dataset.defaultText;
    }

    // 发送验证码
    document.getElementById('sendSmsBtn').addEventListener('click', async function() {
      var phone = document.getElementById('phone').value.trim();
      if (!phone) { showMessage('请输入手机号', 'error'); return; }
      if (!/^1[3-9]\d{9}$/.test(phone)) { showMessage('手机号格式不正确', 'error'); return; }

      var btn = this;
      btn.disabled = true;
      btn.textContent = '发送中...';
      showMessage('', 'hidden');

      try {
        var res = await fetch('/api/sms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: phone })
        });
        var data = await res.json();
        if (res.ok && data.success) {
          showMessage('验证码已发送', 'success');
          countdown = 65;
          updateCountdown(btn);
          timer = setInterval(function() { updateCountdown(btn); }, 1000);
        } else {
          btn.disabled = false;
          btn.textContent = '发送验证码';
          showMessage(data.error || '发送失败', 'error');
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = '发送验证码';
        showMessage('网络错误，请稍后重试', 'error');
      }
    });

    function updateCountdown(btn) {
      if (countdown <= 0) {
        clearInterval(timer);
        btn.disabled = false;
        btn.textContent = '发送验证码';
        return;
      }
      btn.textContent = countdown + 's 后重发';
      countdown--;
    }

    // 登录
    (function() {
      var loginBtn = document.getElementById('submitBtn');
      loginBtn.dataset.defaultText = '登 录';

      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var phone = document.getElementById('phone').value.trim();
        var code = document.getElementById('code').value.trim();

        if (!phone) { showMessage('请输入手机号', 'error'); return; }
        if (!code) { showMessage('请输入验证码', 'error'); return; }
        if (!/^1[3-9]\d{9}$/.test(phone)) { showMessage('手机号格式不正确', 'error'); return; }

        setLoading(loginBtn, true);

        try {
          var res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone, code: code })
          });
          var data = await res.json();

          if (res.ok && data.success) {
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('token', data.token);
            var params = new URLSearchParams(window.location.search);
            var redirect = params.get('redirect');
            window.location.href = redirect ? decodeURIComponent(redirect) : '/main';
          } else {
            setLoading(loginBtn, false);
            showMessage(data.error || '登录失败', 'error');
          }
        } catch (err) {
          setLoading(loginBtn, false);
          showMessage('网络错误，请稍后重试', 'error');
        }
      });
    })();
  </script>
</body>
</html>
