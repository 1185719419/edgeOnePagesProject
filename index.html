<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆曲线任务日历</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .landing-body { display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
    .landing-card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:48px; text-align:center; max-width:480px; width:100%; }
    .landing-card h1 { color:#e6edf3; margin-bottom:8px; font-size:1.8rem; }
    .landing-card p { color:#8b949e; margin-bottom:24px; }
    .landing-card a { display:inline-block; padding:10px 32px; background:#238636; color:#fff; border-radius:6px; text-decoration:none; font-weight:600; transition:background 0.2s; }
    .landing-card a:hover { background:#2ea043; }
    .landing-user { color:#58a6ff; font-weight:600; margin-bottom:16px; }
    .landing-btn-group { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .landing-btn-secondary { display:inline-block; padding:10px 32px; background:#21262d; color:#58a6ff; border:1px solid #30363d; border-radius:6px; text-decoration:none; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .landing-btn-secondary:hover { border-color:#58a6ff; }
  </style>
</head>
<body class="landing-body">
  <div class="landing-card" id="authCheck">
    <p style="color:#8b949e;">加载中...</p>
  </div>

  <script>
    (function() {
      var user = null;
      try { user = JSON.parse(localStorage.getItem('user')); } catch(e) {}

      var container = document.getElementById('authCheck');

      if (user && user.id && user.phone) {
        container.innerHTML =
          '<h1>记忆曲线任务日历</h1>' +
          '<p>基于艾宾浩斯记忆曲线的任务管理工具</p>' +
          '<div class="landing-user">已登录: ' + escapeHtml(user.phone) + '</div>' +
          '<div class="landing-btn-group">' +
            '<a href="/main">进入日历</a>' +
            '<span class="landing-btn-secondary" id="landingLogout">退出登录</span>' +
          '</div>';
        document.getElementById('landingLogout').addEventListener('click', function() {
          try { localStorage.removeItem('mcs_cache_' + user.id); } catch (e) {}
          try { localStorage.removeItem('mcs_history_' + user.id); } catch (e) {}
          localStorage.removeItem('user');
          localStorage.removeItem('token');
          window.location.reload();
        });
      } else {
        container.innerHTML =
          '<h1>记忆曲线任务日历</h1>' +
          '<p>基于艾宾浩斯记忆曲线的任务管理工具</p>' +
          '<a href="/login">登录 / 注册</a>';
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }
    })();
  </script>
</body>
</html>
