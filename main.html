<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆曲线任务日历</title>
  <link rel="stylesheet" href="app.css">
</head>
<body data-page="desktop">
  <div class="container">
    <header>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <button id="settingsBtn" class="settings-btn" title="设置">&#9881;</button>
        <span></span>
      </div>
      <h1>记忆曲线任务日历</h1>
      <div class="controls">
        <div class="controls-left">
          <button id="historyBtn" class="history-nav-btn" title="操作历史">&#128338;</button>
        </div>
        <div class="controls-center">
          <button id="prevMonth">&lt;</button>
          <span id="currentMonth"></span>
          <button id="nextMonth">&gt;</button>
        </div>
        <div class="controls-right">
        </div>
      </div>
    </header>

    <div class="calendar">
      <div class="weekdays">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>
      <div id="calendarDays" class="days">
        <div class="loading-calendar" style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#999;">
          <div style="font-size:2em;margin-bottom:12px;">&#8987;</div>
          <div>加载日历中...</div>
        </div>
      </div>
    </div>

    <div id="taskModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalDate"></h2>
        <div class="task-input">
          <div class="task-input-main">
            <textarea id="taskInput" placeholder="输入任务内容（最多500字）" maxlength="500"></textarea>
            <div id="taskImageArea" class="task-image-area">
              <div id="taskImagePreviews" class="task-image-previews"></div>
              <button id="addTaskImage" type="button" class="add-image-btn">+ 添加图片</button>
              <input id="taskImageInput" type="file" accept="image/*" multiple hidden>
            </div>
          </div>
          <div class="task-input-side">
            <label class="review-sync-toggle">
              <input id="syncReviewTasks" type="checkbox"><span>同步到复习日期</span>
            </label>
            <button id="addTask">添加任务</button>
          </div>
        </div>
        <div id="taskList" class="task-list"></div>
      </div>
    </div>

    <div id="taskDetailModal" class="modal">
      <div class="modal-content detail-modal-content">
        <span class="close detail-close">&times;</span>
        <h2 id="detailModalTitle">任务详情</h2>
        <div id="taskDetailBody"></div>
      </div>
    </div>

    <div id="editTaskModal" class="modal">
      <div class="modal-content edit-modal-content">
        <span class="close edit-close">&times;</span>
        <h2 id="editModalTitle">编辑任务</h2>
        <textarea id="editTaskInput" class="edit-task-input" maxlength="500" placeholder="输入任务内容（最多500字）"></textarea>
        <label class="edit-sync-toggle" id="editSyncToggle" style="display:none;">
          <input id="editSyncReviews" type="checkbox"><span>同步修改关联的复习任务</span>
        </label>
        <div id="editTaskImageArea" class="edit-task-image-area"></div>
        <div class="edit-modal-actions">
          <button id="saveTaskEdit" class="edit-btn">保存</button>
          <button id="cancelTaskEdit" class="delete-btn">取消</button>
        </div>
      </div>
    </div>

    <div id="settingsPage" class="page-overlay" style="display:none;">
      <div class="page-container settings-page-container">
        <div class="page-header">
          <button class="page-back-btn" id="settingsBackBtn" title="返回">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <h2>设置</h2>
        </div>
        <div class="settings-layout">
          <div class="settings-sidebar">
            <div class="menu-list">
              <div class="menu-item active" data-panel="reviewConfig">
                <div class="menu-item-content">
                  <div class="menu-item-title">配置复习日期</div>
                  <div class="menu-item-desc">任务创建后，在第 N 天自动生成复习任务</div>
                </div>
              </div>
              <div class="menu-item" data-panel="batchDelete">
                <div class="menu-item-content">
                  <div class="menu-item-title">批量删除</div>
                  <div class="menu-item-desc">按年月批量删除任务</div>
                </div>
              </div>
              <div class="menu-item" data-panel="account">
                <div class="menu-item-content">
                  <div class="menu-item-title">账号管理</div>
                  <div class="menu-item-desc" id="settingsUsername">查看账号信息和退出登录</div>
                </div>
              </div>
              <div class="menu-item" data-panel="theme">
                <div class="menu-item-content">
                  <div class="menu-item-title">主题设置</div>
                  <div class="menu-item-desc">切换浅色/深色主题</div>
                </div>
              </div>
            </div>
          </div>
          <div class="settings-main">
            <div id="panel-reviewConfig" class="settings-panel">
              <div class="settings-block">
                <div class="settings-block-header">
                  <h3>复习间隔</h3>
                  <span class="settings-block-hint">任务创建后，在第 N 天自动生成复习任务</span>
                </div>
                <div id="intervalsEditor" class="intervals-editor"></div>
                <div class="settings-block-actions">
                  <button id="settingsAddInterval" class="edit-btn">+ 增加复习次数</button>
                  <button id="settingsReset" class="delete-btn">恢复默认</button>
                </div>
              </div>
              <div class="settings-actions">
                <button id="settingsSave" class="edit-btn">保存设置</button>
              </div>
            </div>
            <div id="panel-batchDelete" class="settings-panel" style="display:none;">
              <div class="settings-block">
                <div class="settings-block-header">
                  <span class="settings-block-hint">删除指定年月下的所有任务（含关联的复习任务），不可撤回</span>
                </div>
                <div class="batch-delete-selectors">
                  <div class="batch-select-group">
                    <label for="batchDeleteYear">年份</label>
                    <select id="batchDeleteYear"></select>
                  </div>
                  <div class="batch-select-group">
                    <label for="batchDeleteMonth">月份</label>
                    <select id="batchDeleteMonth"></select>
                  </div>
                </div>
                <div class="batch-delete-info" id="batchDeleteInfo"></div>
              </div>
              <div class="settings-actions" style="justify-content:flex-start;">
                <button id="confirmBatchDelete" style="background:#fff;color:#d83a52;border:1px solid #d83a52;padding:10px 28px;border-radius:8px;cursor:pointer;font-size:0.95em;font-weight:500;transition:all 0.2s;">确认删除</button>
              </div>
            </div>
            <div id="panel-account" class="settings-panel" style="display:none;">
              <div class="settings-block">
                <div class="settings-block-header">
                  <h3>账号信息</h3>
                  <span class="settings-block-hint">当前登录的账号</span>
                </div>
                <div style="display:flex;align-items:center;gap:16px;padding:12px 0;">
                  <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3em;font-weight:700;" id="avatarLetter"></div>
                  <div>
                    <div style="font-weight:600;color:#333;font-size:1.05em;" id="accountName"></div>
                    <div style="font-size:0.85em;color:#999;margin-top:2px;">记忆曲线任务日历用户</div>
                  </div>
                </div>
              </div>
              <div class="settings-actions" style="justify-content:flex-start;">
                <button id="settingsLogoutBtn" style="background:#fff;color:#d83a52;border:1px solid #d83a52;padding:10px 28px;border-radius:8px;cursor:pointer;font-size:0.95em;font-weight:500;transition:all 0.2s;">退出登录</button>
              </div>
            </div>
            <div id="panel-theme" class="settings-panel" style="display:none;">
              <div class="settings-block">
                <div class="settings-block-header">
                  <h3>主题设置</h3>
                  <span class="settings-block-hint">选择你喜欢的界面配色</span>
                </div>
                <div class="theme-cards">
                  <div class="theme-card active" data-theme="light" id="themeCardLight">
                    <div class="theme-card-preview theme-preview-light"></div>
                    <div class="theme-card-label">浅色主题</div>
                  </div>
                  <div class="theme-card" data-theme="dark" id="themeCardDark">
                    <div class="theme-card-preview theme-preview-dark"></div>
                    <div class="theme-card-label">深色主题</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="historyContextMenu" class="history-context-menu" style="display:none;"></div>

    <div id="revertConfirmDialog" class="revert-confirm-overlay" style="display:none;">
      <div class="revert-confirm-card">
        <div class="revert-confirm-icon">&#8634;</div>
        <div class="revert-confirm-title">确认回退</div>
        <div class="revert-confirm-body">将恢复到以下操作之前的状态：</div>
        <div class="revert-confirm-desc" id="revertConfirmDesc"></div>
        <div class="revert-confirm-actions">
          <button class="revert-confirm-cancel" onclick="cancelRevert()">取消</button>
          <button class="revert-confirm-ok" onclick="executeRevert()">确认回退</button>
        </div>
      </div>
    </div>

    <!-- 通用确认弹窗 -->
    <div id="confirmDialog" class="revert-confirm-overlay" style="display:none;">
      <div class="revert-confirm-card">
        <div class="revert-confirm-icon" id="confirmDialogIcon">&#9888;</div>
        <div class="revert-confirm-title" id="confirmDialogTitle">确认操作</div>
        <div class="revert-confirm-body" id="confirmDialogBody"></div>
        <div class="revert-confirm-actions">
          <button class="revert-confirm-cancel" id="confirmDialogCancel">取消</button>
          <button class="revert-confirm-ok" id="confirmDialogOk">确认</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 图片查看器 -->
  <div id="imgViewer" class="img-viewer" style="display:none;">
    <button id="imgViewerClose" class="img-viewer-close">&times;</button>
    <img id="imgViewerImg" src="" alt="">
  </div>

  <script src="app.js"></script>
</body>
</html>
